<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Sombra offset neobrutalista en amarillo -->
  <rect x="3" y="3" width="28" height="28" rx="1" fill="#FFE500"/>
  <!-- Cuerpo principal negro con borde amarillo -->
  <rect x="1" y="1" width="28" height="28" rx="1" fill="#0a0a0a" stroke="#FFE500" stroke-width="1.5"/>
  <!-- [L] centrado -->
  <text
    x="15" y="15"
    font-family="'Courier New', Courier, monospace"
    font-size="12" font-weight="700"
    text-anchor="middle"
    dominant-baseline="central"
    fill="#FFE500"
    letter-spacing="0.5"
  >[L]</text>
</svg>
